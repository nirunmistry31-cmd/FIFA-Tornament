<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Tournament – 12 Players</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853; --gold: #ffd600; --dark: #0a0f0a;
    --card: #111811; --card2: #161e16; --border: #1e2e1e;
    --text: #e8f5e9; --muted: #5a7a5a; --red: #ff1744; --accent: #00e676;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,200,83,0.03) 80px, rgba(0,200,83,0.03) 81px),
      repeating-linear-gradient(0deg,  transparent, transparent 80px, rgba(0,200,83,0.03) 80px, rgba(0,200,83,0.03) 81px);
    pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 12px 60px; }

  header { text-align: center; padding: 32px 0 24px; }
  header .trophy { font-size: 42px; display: block; margin-bottom: 6px; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem, 7vw, 4.2rem); letter-spacing: 4px; color: var(--gold); line-height: 1; text-shadow: 0 0 40px rgba(255,214,0,0.3); }
  header p { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

  .tabs { display: flex; gap: 4px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .tab { flex: 1; padding: 10px 4px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; background: none; border: none; color: var(--muted); cursor: pointer; border-radius: 7px; transition: all .2s; }
  .tab.active { background: var(--green); color: #000; font-weight: 700; }
  .tab:hover:not(.active) { color: var(--text); }

  .panel { display: none; } .panel.active { display: block; }

  .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  @media(max-width:500px) { .setup-grid { grid-template-columns: 1fr; } }
  .player-input { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; }
  .player-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--green); width: 28px; }
  .player-input input { background: none; border: none; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.95rem; flex: 1; outline: none; }
  .player-input input::placeholder { color: var(--muted); }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; transition: all .2s; }
  .btn-primary { background: var(--green); color: #000; }
  .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
  .center { text-align: center; }

  .groups-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }
  .group-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .group-header { background: linear-gradient(135deg, #0d1f0d, #162816); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .group-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 3px; color: var(--gold); }

  .standings { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .standings th { font-family: 'Barlow Condensed', sans-serif; letter-spacing: 2px; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; padding: 6px 8px; text-align: center; }
  .standings th:first-child { text-align: left; }
  .standings td { padding: 6px 8px; text-align: center; border-top: 1px solid rgba(255,255,255,0.04); }
  .standings td:first-child { text-align: left; }
  .standings tr.qualify td { color: var(--accent); }
  .standings .pts { font-weight: 700; color: var(--gold); }
  .pos-badge { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; margin-right: 6px; background: var(--border); color: var(--muted); }
  .pos-1 { background: var(--gold); color: #000; }
  .pos-2 { background: var(--green); color: #000; }

  .matches-list { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 6px; }
  .match-row { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; }
  .match-team { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .match-team.right { text-align: right; }
  .match-score { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .score-input { width: 36px; background: var(--card2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; padding: 4px 2px; outline: none; }
  .score-input:focus { border-color: var(--green); }
  .score-sep { color: var(--muted); font-family: 'Bebas Neue', sans-serif; }
  .save-btn { background: none; border: 1px solid var(--green); color: var(--green); border-radius: 5px; padding: 3px 8px; font-size: 0.7rem; letter-spacing: 1px; font-family: 'Barlow Condensed', sans-serif; cursor: pointer; text-transform: uppercase; transition: all .15s; flex-shrink: 0; }
  .save-btn:hover { background: var(--green); color: #000; }
  .played-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--gold); min-width: 44px; text-align: center; flex-shrink: 0; }

  .round-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 3px; color: var(--gold); margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .ko-matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; }
  .ko-match { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .ko-match-teams { display: flex; flex-direction: column; gap: 8px; }
  .ko-team-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .ko-team-name { font-size: 0.88rem; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ko-team-name.winner { color: var(--gold); }
  .ko-score-input { width: 42px; background: var(--card2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; padding: 4px; outline: none; flex-shrink: 0; }
  .ko-score-input:focus { border-color: var(--green); }
  .vs-line { text-align: center; font-family: 'Barlow Condensed', sans-serif; color: var(--muted); font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 6px; }
  .ko-save-btn { margin-top: 10px; width: 100%; }
  .tbd { color: var(--muted); font-style: italic; font-size: 0.85rem; }

  .champion-banner { text-align: center; padding: 32px 20px; background: linear-gradient(135deg, #1a1500, #0d1f0d); border: 1px solid var(--gold); border-radius: 16px; margin-top: 24px; }
  .champion-trophy { font-size: 64px; display: block; animation: pulse 1.5s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
  .champion-banner h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 6px; color: var(--muted); margin-top: 8px; }
  .champion-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 10vw, 4rem); color: var(--gold); letter-spacing: 4px; }

  .notice { background: rgba(0,200,83,0.07); border: 1px solid rgba(0,200,83,0.2); border-radius: 8px; padding: 12px 16px; font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; }
  .notice strong { color: var(--accent); }
  .section-label { font-family: 'Barlow Condensed', sans-serif; letter-spacing: 4px; text-transform: uppercase; font-size: 0.75rem; color: var(--muted); margin-bottom: 10px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="trophy">⚽</span>
    <h1>FIFA Tournament</h1>
    <p>12 Players &bull; Group Stage + Knockout</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('setup')">Setup</button>
    <button class="tab" onclick="showTab('groups')">Groups</button>
    <button class="tab" onclick="showTab('knockout')">Knockout</button>
  </div>

  <div id="panel-setup" class="panel active">
    <p class="section-label">Enter Player Names</p>
    <div class="setup-grid" id="player-inputs"></div>
    <hr class="divider">
    <div class="center">
      <button class="btn btn-primary" onclick="generateTournament()">⚡ Generate Tournament</button>
    </div>
  </div>

  <div id="panel-groups" class="panel">
    <div class="notice">
      <strong>4 groups of 3</strong>. Top 2 from each group advance — 8 players go straight to the Quarter-Finals.
    </div>
    <div class="groups-container" id="groups-container"></div>
    <hr class="divider">
    <div class="center">
      <button class="btn btn-primary" onclick="advanceToKnockout()">Advance to Knockout →</button>
    </div>
  </div>

  <div id="panel-knockout" class="panel">
    <div id="knockout-container"></div>
  </div>
</div>

<script>
let state = {
  players: Array.from({length:12}, (_,i) => `Player ${i+1}`),
  groups: [],
  ko: { qf:[], sf:[], final:null, champion:null }
};

function initSetup() {
  const el = document.getElementById('player-inputs');
  el.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    el.innerHTML += `
      <div class="player-input">
        <span class="player-num">${i+1}</span>
        <input type="text" id="p${i}" placeholder="Player ${i+1}" value="${state.players[i]}">
      </div>`;
  }
}

function readPlayers() {
  for (let i = 0; i < 12; i++) {
    const v = document.getElementById(`p${i}`).value.trim();
    state.players[i] = v || `Player ${i+1}`;
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function roundRobin(players) {
  const m = [];
  for (let i = 0; i < players.length; i++)
    for (let j = i+1; j < players.length; j++)
      m.push({h:players[i], a:players[j], hs:'', as:'', played:false});
  return m;
}

function generateTournament() {
  readPlayers();
  const s = shuffle(state.players);
  // 4 groups of 3 — clean and simple
  state.groups = [
    { name:'Group A', players:s.slice(0,3),  matches:[] },
    { name:'Group B', players:s.slice(3,6),  matches:[] },
    { name:'Group C', players:s.slice(6,9),  matches:[] },
    { name:'Group D', players:s.slice(9,12), matches:[] }
  ];
  state.groups.forEach(g => g.matches = roundRobin(g.players));
  state.ko = { qf:[], sf:[], final:null, champion:null };
  renderGroups();
  showTab('groups');
}

function getStandings(group) {
  const t = {};
  group.players.forEach(p => t[p] = {p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
  group.matches.forEach(m => {
    if (!m.played) return;
    const hs = parseInt(m.hs), as = parseInt(m.as);
    t[m.h].p++; t[m.a].p++;
    t[m.h].gf += hs; t[m.h].ga += as;
    t[m.a].gf += as; t[m.a].ga += hs;
    if (hs > as)      { t[m.h].w++; t[m.h].pts+=3; t[m.a].l++; }
    else if (as > hs) { t[m.a].w++; t[m.a].pts+=3; t[m.h].l++; }
    else              { t[m.h].d++; t[m.a].d++; t[m.h].pts++; t[m.a].pts++; }
  });
  return Object.entries(t)
    .map(([name,s]) => ({name, ...s, gd:s.gf-s.ga}))
    .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
}

function renderGroups() {
  const el = document.getElementById('groups-container');
  el.innerHTML = '';
  state.groups.forEach((g, gi) => {
    const standings = getStandings(g);
    let rows = standings.map((s, i) => `
      <tr class="${i<2?'qualify':''}">
        <td><span class="pos-badge ${i===0?'pos-1':i===1?'pos-2':''}">${i+1}</span>${s.name}</td>
        <td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
        <td>${s.gd>0?'+':''}${s.gd}</td>
        <td class="pts">${s.pts}</td>
      </tr>`).join('');

    let matchRows = g.matches.map((m, mi) => {
      if (m.played) return `
        <div class="match-row">
          <span class="match-team">${m.h}</span>
          <span class="played-score">${m.hs} – ${m.as}</span>
          <span class="match-team right">${m.a}</span>
        </div>`;
      return `
        <div class="match-row">
          <span class="match-team">${m.h}</span>
          <div class="match-score">
            <input class="score-input" type="number" min="0" max="20" id="g${gi}m${mi}h" placeholder="0">
            <span class="score-sep">–</span>
            <input class="score-input" type="number" min="0" max="20" id="g${gi}m${mi}a" placeholder="0">
          </div>
          <span class="match-team right">${m.a}</span>
          <button class="save-btn" onclick="saveGroupMatch(${gi},${mi})">Save</button>
        </div>`;
    }).join('');

    el.innerHTML += `
      <div class="group-card">
        <div class="group-header">
          <span class="group-title">${g.name}</span>
          <span style="font-size:0.7rem;letter-spacing:2px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;">
            ${g.matches.filter(m=>m.played).length}/${g.matches.length} played
          </span>
        </div>
        <div style="padding:10px 16px 4px">
          <table class="standings">
            <thead><tr><th>Player</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="matches-list">${matchRows}</div>
      </div>`;
  });
}

function saveGroupMatch(gi, mi) {
  const hs = document.getElementById(`g${gi}m${mi}h`).value;
  const as = document.getElementById(`g${gi}m${mi}a`).value;
  if (hs===''||as==='') return alert('Enter both scores!');
  state.groups[gi].matches[mi].hs = hs;
  state.groups[gi].matches[mi].as = as;
  state.groups[gi].matches[mi].played = true;
  renderGroups();
}

function advanceToKnockout() {
  // Top 2 from each of 4 groups = 8 players, clean QF bracket
  // Seeding: A1 vs D2, B1 vs C2, C1 vs B2, D1 vs A2
  const q = state.groups.map(g => {
    const s = getStandings(g);
    return { first: s[0].name, second: s[1].name };
  });
  state.ko.qf = [
    { h:q[0].first,  a:q[3].second, hs:'', as:'', played:false },
    { h:q[1].first,  a:q[2].second, hs:'', as:'', played:false },
    { h:q[2].first,  a:q[1].second, hs:'', as:'', played:false },
    { h:q[3].first,  a:q[0].second, hs:'', as:'', played:false }
  ];
  state.ko.sf   = [{h:'TBD',a:'TBD',hs:'',as:'',played:false},{h:'TBD',a:'TBD',hs:'',as:'',played:false}];
  state.ko.final = { h:'TBD', a:'TBD', hs:'', as:'', played:false };
  state.ko.champion = null;
  renderKnockout();
  showTab('knockout');
}

function renderKnockout() {
  const el = document.getElementById('knockout-container');
  if (!state.ko.qf.length) {
    el.innerHTML = '<p class="tbd" style="text-align:center;padding:40px">Complete the group stage first.</p>';
    return;
  }
  const qfHtml   = state.ko.qf.map((m,i) => koMatchCard(m,'qf',i,`QF ${i+1}`)).join('');
  const sfHtml   = state.ko.sf.map((m,i) => koMatchCard(m,'sf',i,`SF ${i+1}`)).join('');
  const finalHtml = state.ko.final
    ? `<p class="round-label">⚽ Final</p><div class="ko-matches">${koMatchCard(state.ko.final,'final',0,'Final')}</div>` : '';
  const champHtml = state.ko.champion ? `
    <div class="champion-banner">
      <span class="champion-trophy">🏆</span>
      <h2>Champion</h2>
      <div class="champion-name">${state.ko.champion}</div>
    </div>` : '';

  el.innerHTML = `
    <p class="round-label">⚔️ Quarter-Finals</p>
    <div class="ko-matches">${qfHtml}</div>
    <p class="round-label">🥊 Semi-Finals</p>
    <div class="ko-matches">${sfHtml}</div>
    ${finalHtml}${champHtml}`;
}

function koMatchCard(m, round, idx, label) {
  if (m.played) {
    const hs = parseInt(m.hs), as = parseInt(m.as);
    const hw = hs>as, aw = as>hs;
    return `
      <div class="ko-match">
        <p class="vs-line">${label}</p>
        <div class="ko-match-teams">
          <div class="ko-team-row">
            <span class="ko-team-name${hw?' winner':''}">${hw?'🏅 ':''}${m.h}</span>
            <span style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:${hw?'var(--gold)':'var(--muted)'}">${m.hs}</span>
          </div>
          <div class="ko-team-row">
            <span class="ko-team-name${aw?' winner':''}">${aw?'🏅 ':''}${m.a}</span>
            <span style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:${aw?'var(--gold)':'var(--muted)'}">${m.as}</span>
          </div>
        </div>
      </div>`;
  }
  if (m.h==='TBD') {
    return `<div class="ko-match"><p class="vs-line">${label}</p><p class="tbd" style="padding:12px 0">Awaiting previous round…</p></div>`;
  }
  return `
    <div class="ko-match">
      <p class="vs-line">${label}</p>
      <div class="ko-match-teams">
        <div class="ko-team-row">
          <span class="ko-team-name">${m.h}</span>
          <input class="ko-score-input" type="number" min="0" max="20" id="${round}${idx}h" placeholder="0">
        </div>
        <div class="ko-team-row">
          <span class="ko-team-name">${m.a}</span>
          <input class="ko-score-input" type="number" min="0" max="20" id="${round}${idx}a" placeholder="0">
        </div>
      </div>
      <button class="btn btn-primary btn-sm ko-save-btn" onclick="saveKoMatch('${round}',${idx})">Save Result</button>
    </div>`;
}

function saveKoMatch(round, idx) {
  const hs = document.getElementById(`${round}${idx}h`).value;
  const as = document.getElementById(`${round}${idx}a`).value;
  if (hs===''||as==='') return alert('Enter both scores!');
  if (parseInt(hs)===parseInt(as)) return alert('No draws in knockout! Use extra time/penalties.');

  if (round==='qf') {
    state.ko.qf[idx].hs = hs; state.ko.qf[idx].as = as; state.ko.qf[idx].played = true;
    if (state.ko.qf.every(m=>m.played)) {
      const w = state.ko.qf.map(m => parseInt(m.hs)>parseInt(m.as)?m.h:m.a);
      // SF1: QF1 winner vs QF2 winner, SF2: QF3 winner vs QF4 winner
      state.ko.sf[0] = {h:w[0], a:w[1], hs:'', as:'', played:false};
      state.ko.sf[1] = {h:w[2], a:w[3], hs:'', as:'', played:false};
    }
  } else if (round==='sf') {
    state.ko.sf[idx].hs = hs; state.ko.sf[idx].as = as; state.ko.sf[idx].played = true;
    if (state.ko.sf.every(m=>m.played)) {
      const w = state.ko.sf.map(m => parseInt(m.hs)>parseInt(m.as)?m.h:m.a);
      state.ko.final = {h:w[0], a:w[1], hs:'', as:'', played:false};
    }
  } else if (round==='final') {
    state.ko.final.hs = hs; state.ko.final.as = as; state.ko.final.played = true;
    state.ko.champion = parseInt(hs)>parseInt(as) ? state.ko.final.h : state.ko.final.a;
  }
  renderKnockout();
}

function showTab(name) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>{
    if(t.getAttribute('onclick').includes(`'${name}'`)) t.classList.add('active');
  });
}

initSetup();
</script>
</body>
</html>
